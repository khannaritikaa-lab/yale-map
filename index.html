<!DOCTYPE html>
<html>
<head>
    <title>GeoTag Interactive Mapping Exercise</title>
    <meta charset="utf-8" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

    <!-- Geocoder CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        /* SIDEBAR */
        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 300px;
            padding: 20px;
            font-size: 16px;
            background-color: #add8e6;
            overflow-y: auto;
            border-right: 2px solid black;
        }

        .green-heading {
            color: #3D9970;
            text-align: center;
        }

        /* MAP (THIS FIXES YOUR BLANK MAP ISSUE) */
        #map {
            position: absolute;
            left: 300px;
            top: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <center>
        <h2 class="green-heading">GeoTag Mapping</h2>
    </center>

    <center>
        <img src="images/yale.png" alt="Yale Logo" style="width:60%">
    </center>

    <center>
        <h3>Mapping Yale University!</h3>
    </center>

    <p>
        This map highlights Sterling Memorial Library and Willoughby's Coffee & Tea near campus.
    </p>

    <footer>
        <p>Share this template! <br> https://github.com/</p>
    </footer>

</div>

<!-- MAP -->
<div id="map"></div>

<!-- JS LIBRARIES -->
<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>

<!-- YOUR FILES -->
<script src="js/setup.js"></script>
<script src="js/tyler.js"></script>

<!-- GEOJSON STYLE -->
<script>
var myStyle = {
    radius: 5,
    fillColor: "#ff7800",
    color: "#000",
    weight: 1,
    opacity: 1,
    fillOpacity: 0.7
};

var tylerLayer = L.geoJSON(tyler, {
    style: myStyle,
    onEachFeature: function (feature, layer) {
        layer.bindPopup(feature.properties.name);
    }
}).addTo(map).bringToBack();

console.log("Map loaded successfully!");
</script>

</body>
</html>
